name: Claude - website change requests

# Fires when the /admin dashboard opens an issue (it always tags @claude), and
# when someone replies on that issue or a PR to ask for a revision.
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Enough to read the repo, push a branch, and open a PR - and no more.
#
# id-token: write is required by claude-code-action, which mints an OIDC token
# to authenticate back to GitHub. Without it the action dies on startup with
# "Could not fetch an OIDC token" before doing any work. It grants the ability
# to request an identity token, not write access to anything.
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: write # the action caches its runtime between runs

jobs:
  claude:
    # Only run when @claude is actually mentioned, so ordinary issue chatter
    # doesn't burn API tokens.
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # One at a time. Two agents editing the same nine HTML files concurrently
    # would produce conflicting branches.
    concurrency:
      group: claude-change-request
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 25
            --model claude-sonnet-5
            --disallowedTools "WebFetch,WebSearch"
